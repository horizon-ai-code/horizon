services:
  backend:
    image: ghcr.io/horizon-ai-code/horizon-backend:cpu
    ports:
      - "8000:8000"
    volumes:
      - horizon_data:/app/db
    restart: unless-stopped

  frontend:
    image: ghcr.io/horizon-ai-code/horizon-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  horizon_data:
